# Pin the Compose project name explicitly. Without this, Compose derives it
# from the basename of the directory containing this file, which differs
# between a host checkout (e.g. "sudoku_solver_service_inez") and the
# devcontainer's own bind-mounted workspace ("app", per
# .devcontainer/devcontainer.json's workspaceFolder) -- so the same "docker
# compose" commands run from those two contexts would silently operate on
# two unrelated projects instead of the one set of containers.
name: sudoku-solver-service

services:
  backend:
    build: .
    image: jgaltidor/sudoku-solver-backend:latest
    ports:
      - "8080:8080"
    # ${HOST_REPO_ROOT:-.} rather than a plain "." -- from a regular host
    # checkout HOST_REPO_ROOT is unset and this resolves the same as before,
    # but "docker compose" run inside the devcontainer talks to the real
    # host's Docker daemon (docker.sock is bind-mounted in) while resolving
    # relative paths against its own, different filesystem, so a plain "."
    # there would resolve to a devcontainer-only path the real daemon has
    # never heard of and refuses to bind-mount. HOST_REPO_ROOT (set in
    # .devcontainer/devcontainer.json's containerEnv) supplies the real host
    # path in that case.
    volumes:
      - ${HOST_REPO_ROOT:-.}/sudoku_solver_inez:/home/john/app/sudoku_solver_inez
    # solver.ml itself is fed straight into the Inez OCaml toplevel on every
    # request (see run_solver.sh/solver.sh) rather than compiled, so bind-
    # mounting it needs no rebuild step for that file. sudoku.cma (the
    # OMakefile-built library the other solver modules compile into,
    # loaded by solver.init) is different -- it's baked into the image at
    # build time but lives inside the path just bind-mounted over, so it
    # gets shadowed by the (unbuilt) host source. Rebuild it before
    # launching the server, same fix as the devcontainer's own
    # postStartCommand for the same problem.
    command: bash -c 'eval `opam config env` && cd /home/john/app/sudoku_solver_inez/src && omake && cd /home/john/app/SudokuServer && exec ./run.sh'

  frontend:
    build: ./sudoku_ui_prj/sudoku-ui-src
    image: jgaltidor/sudoku-solver-frontend:latest
    ports:
      - "3000:3000"
    environment:
      API_PROXY_TARGET: http://backend:8080
    depends_on:
      - backend
    volumes:
      - ${HOST_REPO_ROOT:-.}/sudoku_ui_prj/sudoku-ui-src:/app
      - /app/node_modules
